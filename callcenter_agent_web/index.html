<!doctype html>
<html>
  <head>
    <title>呼叫中心</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="呼叫中心 - 基于 Vue 3、TypeScript 和 Element Plus 构建的现代化管理系统。"
    />
    <link rel="shortcut icon" type="image/x-icon" href="/assets/favicon-C1KazUkF.ico" />

    <style>
      /* 防止页面刷新时白屏的初始样式 */
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #070707;
      }
    </style>

    <script>
      // 初始化 html class 主题属性
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          console.warn('Failed to apply initial theme:', e)
        }
      })()
    </script>
    <script type="module" crossorigin src="/assets/index-DDExsHNw.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DpPEb2Rp.css">
  </head>

  <body>
    <div id="app"></div>
  </body>
</html>
